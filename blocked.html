<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YT Focus Control - Blocked</title>
  <style>
    body { 
      background-color: #050505; 
      color: white; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 20px;
    }
    h1 { 
      color: #cc0000; 
      font-size: 4rem; 
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    p { 
      font-size: 1.8rem; 
      line-height: 1.4;
      color: #bbb;
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 20px;
    }
    .sleep-mode h1 {
      color: #5cacee;
    }
  </style>
</head>
<body>
  <div id="wrapper" class="container">
    <div id="icon" class="icon">🛑</div>
    <h1 id="headline">STOP!</h1>
    <p id="message">Just go back, shorts are not worth your time.</p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
