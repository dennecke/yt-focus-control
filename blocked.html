<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      background-color: #111; color: white; font-family: sans-serif; 
      display: flex; flex-direction: column; align-items: center; 
      justify-content: center; height: 100vh; margin: 0; 
    }
    h1 { color: #cc0000; font-size: 3rem; }
    p { font-size: 1.5rem; margin-bottom: 2rem; }
    button { 
      padding: 15px 30px; font-size: 1.2rem; cursor: pointer; 
      background: #cc0000; color: white; border: none; border-radius: 5px; 
    }
    button:hover { background: #ff0000; }
  </style>
</head>
<body>
  <h1>STOPP! 🛑</h1>
  <p>Do you really want to start to doomscroll?</p>
  <button onclick="history.back()">Nein, zurück zum Fokus!</button>
</body>
</html>
