<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 250px; 
      font-family: 'Segoe UI', sans-serif; 
      padding: 15px; 
      background: #181818; 
      color: white; 
      margin: 0;
    }
    h2 { font-size: 1.1rem; margin-top: 0; color: #cc0000; }
    .setting-card {
      background: #282828;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .label-text { font-size: 0.9rem; }
    .coming-soon { 
      font-size: 0.7rem; 
      color: #888; 
      font-style: italic; 
    }
    /* Simple Toggle Switch */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444; transition: .3s; border-radius: 20px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px;
      left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #cc0000; }
    input:checked + .slider:before { transform: translateX(14px); }
  </style>
</head>
<body>
  <h2>YT Focus Control</h2>

  <div class="setting-card">
    <div class="label-text">Hide Shorts</div>
    <label class="switch">
      <input type="checkbox" id="blockShorts">
      <span class="slider"></span>
    </label>
  </div>

  <div class="setting-card" style="opacity: 0.6;">
    <div>
      <div class="label-text">Time Schedule</div>
      <div class="coming-soon">Coming soon...</div>
    </div>
  </div>

  <div class="setting-card" style="opacity: 0.6;">
    <div>
      <div class="label-text">Session Limit</div>
      <div class="coming-soon">Coming soon...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
