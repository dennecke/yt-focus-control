<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 250px; font-family: 'Segoe UI', sans-serif; padding: 15px; background: #181818; color: white; margin: 0; }
    h2 { font-size: 1.1rem; margin-top: 0; color: #cc0000; text-align: center; }
    
    .setting-card {
      background: #282828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .label-text { font-size: 0.9rem; font-weight: bold; }

    /* Zeit-Input Styling */
    .time-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    input[type="time"] {
      background: #444;
      color: white;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
    }

    input[type="time"]:focus { border-color: #cc0000; }

    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444; transition: .3s; border-radius: 20px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px;
      left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #cc0000; }
    input:checked + .slider:before { transform: translateX(14px); }
  </style>
</head>
<body>
  <h2>YT Focus Control</h2>

  <div class="setting-card">
    <div class="row">
      <span class="label-text">Hide Shorts</span>
      <label class="switch">
        <input type="checkbox" id="blockShorts">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="setting-card">
    <div class="row">
      <span class="label-text">Sleep Schedule</span>
      <label class="switch">
        <input type="checkbox" id="enableSchedule">
        <span class="slider"></span>
      </label>
    </div>
    <div class="time-inputs">
      <input type="time" id="startTime" value="22:00">
      <span style="font-size: 0.8rem; color: #888;">to</span>
      <input type="time" id="endTime" value="08:00">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
